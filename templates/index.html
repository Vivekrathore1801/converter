<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter Pro</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 30px;
            width: 380px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        select {
            background: #fff;
            color: #333;
        }

        input {
            background: #fff;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .swap-btn {
            background: #ff7a18;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        .swap-btn:hover {
            background: #ff5e00;
        }

        button.convert-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #00c6ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button.convert-btn:hover {
            background: #0072ff;
        }

        .result {
            margin-top: 20px;
            padding: 10px;
            background: rgba(0, 255, 150, 0.2);
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .error {
            margin-top: 10px;
            color: #ff4d4d;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>💱 Currency Converter</h2>

    <form method="POST">
        <div class="row">
            <select id="from_currency" name="from_currency" required>
                <option value="USD">USD</option>
                <option value="INR">INR</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
            </select>

            <button type="button" class="swap-btn" onclick="swapCurrencies()">⇄</button>

            <select id="to_currency" name="to_currency" required>
                <option value="INR">INR</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
            </select>
        </div>

        <input type="number" step="0.01" name="amount" placeholder="Enter Amount" required>

        <button type="submit" class="convert-btn">Convert</button>
    </form>

    {% if result %}
        <div class="result">
            💰 Converted Amount: {{ result }}
        </div>
    {% endif %}

    {% if error %}
        <div class="error">
            ⚠️ {{ error }}
        </div>
    {% endif %}
</div>

<script>
    function swapCurrencies() {
        let from = document.getElementById("from_currency");
        let to = document.getElementById("to_currency");

        let temp = from.value;
        from.value = to.value;
        to.value = temp;
    }
</script>

</body>
</html>
